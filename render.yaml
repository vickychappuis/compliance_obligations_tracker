services:
  - type: web
    name: compliance-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        value: https://fjpqajbylfpotpdlfros.supabase.co
      - key: SUPABASE_BUCKET
        value: obligation-documents
      - key: SIGNED_URL_EXPIRY_SECONDS
        value: 3600
      - key: ALLOWED_ORIGINS
        value: https://obligationstracker.vickychappuis.dev
      # Set these manually in the Render dashboard (never commit secrets):
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
